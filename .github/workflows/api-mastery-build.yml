name: CI / Build Mastery Service

on:
  push:
    branches: [ main ]
    paths:
      - "api/mastery-service/**"
      - ".github/workflows/api-mastery-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/mastery-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Docker image
        run: |
          docker build -t mastery-service .
          docker save mastery-service | gzip > mastery-service-image.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mastery-service-image
          path: api/mastery-service/mastery-service-image.tar.gz
          retention-days: 1

      - name: List image info
        run: |
          echo "Docker image built successfully:"
          docker images mastery-service
          echo "Artifact created: mastery-service-image.tar.gz"
