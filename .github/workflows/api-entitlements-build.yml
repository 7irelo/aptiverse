name: CI / Build Entitlements Service

on:
  push:
    branches: [ main ]
    paths:
      - "api/entitlements-service/**"
      - ".github/workflows/api-entitlements-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/entitlements-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Docker image
        run: |
          docker build -t entitlements-service .
          docker save entitlements-service | gzip > entitlements-service-image.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: entitlements-service-image
          path: api/entitlements-service/entitlements-service-image.tar.gz
          retention-days: 1

      - name: List image info
        run: |
          echo "Docker image built successfully:"
          docker images entitlements-service
          echo "Artifact created: entitlements-service-image.tar.gz"
