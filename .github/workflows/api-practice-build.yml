name: CI / Build Practice Service

on:
  push:
    branches: [ main ]
    paths:
      - "api/practice-service/**"
      - ".github/workflows/api-practice-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/practice-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Docker image
        run: |
          docker build -t practice-service .
          docker save practice-service | gzip > practice-service-image.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: practice-service-image
          path: api/practice-service/practice-service-image.tar.gz
          retention-days: 1

      - name: List image info
        run: |
          echo "Docker image built successfully:"
          docker images practice-service
          echo "Artifact created: practice-service-image.tar.gz"
