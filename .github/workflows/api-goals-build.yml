name: CI / Build Goals Service

on:
  push:
    branches: [ main ]
    paths:
      - "api/goals-service/**"
      - ".github/workflows/api-goals-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/goals-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Docker image
        run: |
          docker build -t goals-service .
          docker save goals-service | gzip > goals-service-image.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: goals-service-image
          path: api/goals-service/goals-service-image.tar.gz
          retention-days: 1

      - name: List image info
        run: |
          echo "Docker image built successfully:"
          docker images goals-service
          echo "Artifact created: goals-service-image.tar.gz"
