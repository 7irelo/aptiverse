default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  database: <%= ENV.fetch("POSTGRES_DB", "aptiverse") %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "aptiverse") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB_TEST", ENV.fetch("POSTGRES_DB", "aptiverse")) %>

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB", "aptiverse") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_CACHE_DB", ENV.fetch("POSTGRES_DB", "aptiverse")) %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_QUEUE_DB", ENV.fetch("POSTGRES_DB", "aptiverse")) %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_CABLE_DB", ENV.fetch("POSTGRES_DB", "aptiverse")) %>
    migrations_paths: db/cable_migrate
