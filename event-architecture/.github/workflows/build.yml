name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.30.0"

      - name: Lint protobuf
        run: buf lint

      - name: Generate protobuf code
        run: buf generate

      - name: Go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run tests
        run: go test -race -cover ./...

      - name: Build binary
        run: go build -o bin/event-server ./cmd/server

      - name: Build Docker image
        run: |
          docker build -f deployments/docker/Dockerfile \
            -t ghcr.io/${{ github.repository }}/event-server:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/event-server:latest \
            .

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository }}/event-server:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/event-server:latest
