name: CI / Build Aptiverse API

on:
  push:
    branches: [ main ]
    paths:
      - "api/aptiverse-api/**"
      - ".github/workflows/api-aptiverse-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/aptiverse-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Docker image
        run: |
          docker build -t aptiverse-api .
          docker save aptiverse-api | gzip > aptiverse-api-image.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aptiverse-api-image
          path: api/aptiverse-api/aptiverse-api-image.tar.gz
          retention-days: 1

      - name: List image info
        run: |
          echo "Docker image built successfully:"
          docker images aptiverse-api
          echo "Artifact created: aptiverse-api-image.tar.gz"
